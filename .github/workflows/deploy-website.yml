name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: rorycaraher/no-deploy-fridays@v4bc02e56befcbcc81d56460a97604bf708cd23a0
        with:
          timezone: "Germany/Berlin"
          work-days: "tue,wed,thu,fri"
  build:
    needs: deploy-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.153.3"
          extended: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build site
        run: hugo --source . --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: [deploy-gate, build]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

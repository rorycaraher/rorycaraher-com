{{ define "main" }}
<h1>{{ .Title }}</h1>
<div class="mg-row" style="gap: 1.6rem 0;">
  {{ range where site.Data.projects "featured" true }}
  <div class="mg-x12 mg-m4" style="padding: .8rem;">
    <div style="border: .1rem solid var(--mg-color-quinary); border-radius: var(--mg-control-radius); padding: 2rem 2.4rem; height: 100%;">
      <h3 style="margin-top: 0;">
        <a href="{{ .url }}" target="_blank" rel="noopener noreferrer">{{ .name }}</a>
      </h3>
      <p style="color: var(--mg-color-tertiary); margin-bottom: 1.2rem;">{{ .description }}</p>
      <div>
        {{ range .tags }}
        <span style="display: inline-block; font-size: 1.2rem; padding: .2rem .8rem; margin: .2rem .2rem 0 0; border-radius: var(--mg-control-radius); background: var(--mg-color-quinary); color: var(--mg-color-secondary);">{{ . }}</span>
        {{ end }}
      </div>
    </div>
  </div>
  {{ end }}
</div>
{{ end }}
